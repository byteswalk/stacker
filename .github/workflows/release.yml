name: Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Prepare Rust toolchain
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable
      - name: Install frontend dependencies
        run: npm ci
      - name: Validate tag and package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          if ($env:GITHUB_REF_NAME -ne "v$version") {
            throw "Tag $env:GITHUB_REF_NAME does not match package version v$version"
          }
      - name: Build Windows packages
        shell: pwsh
        run: npm run release:windows
      - name: Resolve artifact directory
        id: release
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          "version=$version" >> $env:GITHUB_OUTPUT
          "directory=release/v$version" >> $env:GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        with:
          name: stacker-windows-${{ steps.release.outputs.version }}
          path: ${{ steps.release.outputs.directory }}/*
          if-no-files-found: error
      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $files = Get-ChildItem "${{ steps.release.outputs.directory }}" -File | ForEach-Object FullName
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag @files --clobber
          } else {
            gh release create $tag @files --title "Stacker $tag" --generate-notes
          }
